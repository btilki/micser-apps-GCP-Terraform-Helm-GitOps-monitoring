name: Promote image

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service name
        required: true
        type: choice
        options:
          - frontend
          - cartservice
          - currencyservice
          - productcatalogservice
          - redis-cart
      source_env:
        description: Source environment (AR repo suffix)
        required: true
        type: choice
        options:
          - dev
          - stage
      target_env:
        description: Target environment
        required: true
        type: choice
        options:
          - stage
          - prod
      digest:
        description: Image digest (sha256:...)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env == 'prod' && 'prod' || 'stage' }}
    env:
      GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@11bd71901b812cc519ae06cda381b8b47ca04d18

      - uses: google-github-actions/auth@6f9ef137b54a388b97894b986eabd2eea49e9c07
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PROMOTE_SA }}

      - uses: google-github-actions/setup-gcloud@77a7293e98e099e5d35dcca3030e940a5b33a83f

      - name: Copy image between Artifact Registry repos
        run: |
          src="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/boutique-${{ inputs.source_env }}/${{ inputs.service }}"
          dst="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/boutique-${{ inputs.target_env }}/${{ inputs.service }}"
          gcloud artifacts docker images copy \
            "${src}@${{ inputs.digest }}" \
            "${dst}@${{ inputs.digest }}" \
            --quiet

      - name: Patch target GitOps values
        run: |
          file="gitops/envs/${{ inputs.target_env }}/values-${{ inputs.service }}.yaml"
          sed -i "s|digest:.*|digest: \"${{ inputs.digest }}\"|" "$file"
          sed -i "s|boutique-${{ inputs.source_env }}|boutique-${{ inputs.target_env }}|g" "$file"
          sed -i "s|REGION-docker.pkg.dev/PROJECT_ID|${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}|g" "$file"

      - name: Open promotion PR
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4ab8d5af1b0114586f55f81
        with:
          branch: "promote/${{ inputs.service }}-${{ inputs.target_env }}-${{ github.run_id }}"
          title: "promote(${{ inputs.service }}): ${{ inputs.source_env }} → ${{ inputs.target_env }}"
          commit-message: "promote(${{ inputs.service }}): update ${{ inputs.target_env }} digest"
          body: |
            Promoted `${{ inputs.service }}` digest `${{ inputs.digest }}`
            from `boutique-${{ inputs.source_env }}` to `boutique-${{ inputs.target_env }}`.

      - name: Smoke test
        run: |
          host="${{ inputs.target_env }}.boutique.example.com"
          if [ "${{ inputs.target_env }}" = "prod" ]; then host="boutique.example.com"; fi
          if [ "${{ inputs.service }}" = "frontend" ]; then
            bash scripts/smoke.sh "https://${host}"
          fi
