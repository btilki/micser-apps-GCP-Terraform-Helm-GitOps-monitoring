name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      stack:
        description: "bootstrap or foundation"
        required: true
        default: foundation
        type: choice
        options:
          - bootstrap
          - foundation
      action:
        description: "plan or apply"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt and validate (bootstrap)
        run: |
          terraform -chdir=infra/terraform/envs/bootstrap init -backend=false
          terraform -chdir=infra/terraform/envs/bootstrap fmt -check -recursive
          terraform -chdir=infra/terraform/envs/bootstrap validate

      - name: Terraform fmt and validate (foundation)
        run: |
          terraform -chdir=infra/terraform/envs/foundation init -backend=false
          terraform -chdir=infra/terraform/envs/foundation fmt -check -recursive
          terraform -chdir=infra/terraform/envs/foundation validate

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Helm lint
        run: make helm-lint

  security:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          working_directory: infra/terraform

      - name: Checkov
        run: |
          pip install checkov==3.2.346
          checkov -d infra/terraform --framework terraform --config-file infra/terraform/.checkov.yaml --quiet

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.71.0
          scan-type: config
          scan-ref: infra/terraform
          trivyignores: infra/terraform/.trivyignore
          severity: HIGH,CRITICAL
          exit-code: "1"

  plan-apply:
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    needs: [validate]
    runs-on: ubuntu-latest
    environment: terraform
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: 1.9.8

      # terraform.tfvars is gitignored locally; generate CI inputs from repo variables/secrets.
      - name: Write CI Terraform variables
        working-directory: infra/terraform/envs/${{ github.event.inputs.stack || 'foundation' }}
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
          BUILD_CI_SA: ${{ secrets.GCP_BUILD_SA }}
          PROMOTE_CI_SA: ${{ secrets.GCP_PROMOTE_SA }}
          TFSTATE_BUCKET: ${{ vars.TFSTATE_BUCKET_NAME }}
          DNS_ZONE: ${{ vars.DNS_ZONE_NAME || 'boutique-example-com' }}
          DNS_DOMAIN: ${{ vars.DNS_DOMAIN || 'boutique.example.com.' }}
          MASTER_AUTH_NETS: ${{ vars.GCP_MASTER_AUTHORIZED_NETWORKS_JSON || '[]' }}
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          STACK="${{ github.event.inputs.stack || 'foundation' }}"

          if [ -z "${PROJECT_ID}" ]; then
            echo "::error::Repository variable GCP_PROJECT_ID is not set (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi

          if [ "$STACK" = "bootstrap" ]; then
            BUCKET="${TFSTATE_BUCKET:-tfstate-${PROJECT_ID}}"
            cat > ci.auto.tfvars.json <<EOF
          {
            "project_id": "${PROJECT_ID}",
            "region": "${REGION}",
            "tfstate_bucket_name": "${BUCKET}",
            "github_org": "${GITHUB_ORG}",
            "github_repo": "${GITHUB_REPO}"
          }
          EOF
          else
            BUILD_SA="${BUILD_CI_SA:-sa-build-ci@${PROJECT_ID}.iam.gserviceaccount.com}"
            PROMOTE_SA="${PROMOTE_CI_SA:-sa-promote-ci@${PROJECT_ID}.iam.gserviceaccount.com}"
            cat > ci.auto.tfvars.json <<EOF
          {
            "project_id": "${PROJECT_ID}",
            "region": "${REGION}",
            "build_ci_sa_email": "${BUILD_SA}",
            "promote_ci_sa_email": "${PROMOTE_SA}",
            "dns_zone_name": "${DNS_ZONE}",
            "dns_domain": "${DNS_DOMAIN}",
            "master_authorized_networks": ${MASTER_AUTH_NETS}
          }
          EOF
          fi

          echo "Generated ci.auto.tfvars.json for ${STACK}:"
          jq 'del(.master_authorized_networks) | . + {master_authorized_networks: "<redacted>"}' ci.auto.tfvars.json

      - name: Terraform init/plan/apply
        working-directory: infra/terraform/envs/${{ github.event.inputs.stack || 'foundation' }}
        run: |
          terraform init -input=false
          if [ "${{ github.event.inputs.action || 'plan' }}" = "apply" ]; then
            terraform apply -input=false -auto-approve
          else
            terraform plan -input=false
          fi
