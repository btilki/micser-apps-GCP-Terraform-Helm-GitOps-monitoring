name: CI productcatalogservice

permissions:
  contents: write
  id-token: write
  pull-requests: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/productcatalogservice/**"
      - "charts/productcatalogservice/**"
      - ".github/workflows/reusable-service-ci.yml"
      - ".github/workflows/ci-productcatalogservice.yml"

jobs:
  ci:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service: productcatalogservice
    secrets: inherit
