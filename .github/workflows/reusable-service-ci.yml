name: Reusable Service CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
    # Secrets are inherited from the caller (see ci-*.yml). Do not declare
    # workflow_call secrets here when the job uses `environment:` — that
    # combination triggers "required but not provided while calling" errors.

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    environment: build
    env:
      SERVICE: ${{ inputs.service }}
      GCP_REGION: ${{ vars.GCP_REGION || 'europe-west1' }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      AR_REPO: boutique-dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve build context
        id: meta
        run: |
          dockerfile=$(jq -r ".[\"${SERVICE}\"].dockerfile" scripts/services.json)
          context=$(jq -r ".[\"${SERVICE}\"].context" scripts/services.json)
          echo "dockerfile=${dockerfile}" >> "$GITHUB_OUTPUT"
          echo "context=${context}" >> "$GITHUB_OUTPUT"
          echo "image=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${AR_REPO}/${SERVICE}" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_BUILD_SA }}

      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          docker build \
            -f "${{ steps.meta.outputs.dockerfile }}" \
            -t "${{ steps.meta.outputs.image }}:${GITHUB_SHA}" \
            "${{ steps.meta.outputs.context }}"

      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft "${{ steps.meta.outputs.image }}:${GITHUB_SHA}" -o cyclonedx-json > "sbom-${SERVICE}.json"
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: sbom-${{ inputs.service }}
          path: sbom-${{ inputs.service }}.json
        if: always()

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_CACHE_DIR: /tmp/trivy
        with:
          version: v0.71.0
          image-ref: "${{ steps.meta.outputs.image }}:${{ github.sha }}"
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push image
        id: push
        run: |
          docker push "${{ steps.meta.outputs.image }}:${GITHUB_SHA}"
          digest=$(gcloud artifacts docker images describe \
            "${{ steps.meta.outputs.image }}:${GITHUB_SHA}" \
            --format='value(image_summary.digest)')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY}" ]; then
            echo "COSIGN_PRIVATE_KEY not set - skipping image signing"
            exit 0
          fi
          curl -fsSL -o /usr/local/bin/cosign \
            https://github.com/sigstore/cosign/releases/download/v2.4.3/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign
          cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}"

      - name: Create Binary Authorization attestation
        run: |
          gcloud beta container binauthz attestations sign-and-create \
            --artifact-url="${{ steps.meta.outputs.image }}@${{ steps.push.outputs.digest }}" \
            --attestor="boutique-cosign" \
            --project="${GCP_PROJECT_ID}" || true

      - name: Patch dev GitOps values
        run: |
          file="gitops/envs/dev/values-${{ inputs.service }}.yaml"
          sed -i "s|digest:.*|digest: \"${{ steps.push.outputs.digest }}\"|" "$file"
          sed -i "s|REGION-docker.pkg.dev/PROJECT_ID|${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}|g" "$file"

      - name: Open GitOps PR
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f # v7
        with:
          branch: "ci/${{ inputs.service }}-${{ github.sha }}"
          title: "ci(${{ inputs.service }}): deploy digest to dev"
          commit-message: "ci(${{ inputs.service }}): update dev digest"
          add-paths: |
            gitops/envs/dev/values-${{ inputs.service }}.yaml
          body: |
            Automated CI update for `${{ inputs.service }}`.
            Digest: `${{ steps.push.outputs.digest }}`
