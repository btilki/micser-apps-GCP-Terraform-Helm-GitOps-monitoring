name: CI redis-cart

permissions:
  contents: write
  id-token: write
  pull-requests: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/redis-cart/**"
      - "charts/redis-cart/**"
      - ".github/workflows/reusable-service-ci.yml"
      - ".github/workflows/ci-redis-cart.yml"

jobs:
  ci:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service: redis-cart
    secrets: inherit
