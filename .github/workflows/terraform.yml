name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      stack:
        description: "bootstrap or foundation"
        required: true
        default: foundation
        type: choice
        options:
          - bootstrap
          - foundation
      action:
        description: "plan or apply"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_IN_AUTOMATION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt and validate (bootstrap)
        run: |
          terraform -chdir=infra/terraform/envs/bootstrap init -backend=false
          terraform -chdir=infra/terraform/envs/bootstrap fmt -check -recursive
          terraform -chdir=infra/terraform/envs/bootstrap validate

      - name: Terraform fmt and validate (foundation)
        run: |
          terraform -chdir=infra/terraform/envs/foundation init -backend=false
          terraform -chdir=infra/terraform/envs/foundation fmt -check -recursive
          terraform -chdir=infra/terraform/envs/foundation validate

      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0

      - name: Helm lint
        run: make helm-lint

  security:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: tfsec
        uses: aquasecurity/tfsec-action@a73ebc46fba54691e25cbe901656e7b205fb9bf2 # v1.0.0
        with:
          working_directory: infra/terraform

      - name: Checkov
        run: |
          pip install checkov==3.2.346
          checkov -d infra/terraform --framework terraform --quiet

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: infra/terraform
          severity: HIGH,CRITICAL
          exit-code: "1"

  plan-apply:
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    needs: [validate]
    runs-on: ubuntu-latest
    environment: terraform
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SA }}

      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a # v2.1.4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_version: 1.9.8

      - name: Terraform init/plan/apply
        working-directory: infra/terraform/envs/${{ github.event.inputs.stack || 'foundation' }}
        run: |
          terraform init -input=false
          if [ "${{ github.event.inputs.action || 'plan' }}" = "apply" ]; then
            terraform apply -input=false -auto-approve
          else
            terraform plan -input=false
          fi
