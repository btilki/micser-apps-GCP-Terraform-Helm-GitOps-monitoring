name: CI cartservice

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/cartservice/**"
      - "charts/cartservice/**"
      - ".github/workflows/reusable-service-ci.yml"
      - ".github/workflows/ci-cartservice.yml"

jobs:
  ci:
    uses: ./.github/workflows/reusable-service-ci.yml
    with:
      service: cartservice
    secrets:
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      GCP_BUILD_SA: ${{ secrets.GCP_BUILD_SA }}
      COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
